name: emosync_app
description: "A new Flutter project."
publish_to: 'none' 
version: 1.0.4+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  
  # UI
  cupertino_icons: ^1.0.8
  fl_chart: ^1.2.0
  
  # Networking
  http: ^1.2.0
  
  # Storage
  shared_preferences: ^2.2.0
  flutter_secure_storage: ^10.3.1
  
  # State Management
  provider: ^6.1.0
  
  # Utilities
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.jpg"
  adaptive_icon_background: "#FAF9F6"
  adaptive_icon_foreground: "assets/icon/app_icon.jpg"

flutter:
  uses-material-design: true